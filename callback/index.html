<!DOCTYPE html>
<html>
<head><title>Tesla Tasker Plugin</title></head>
<body>
<script>
  var p = new URLSearchParams(window.location.search);
  var code = p.get('code'), state = p.get('state');
  if (code) {
    location.href = 'teslatasker://callback?code=' + code + (state ? '&state=' + state : '');
  }
</script>
<p>Tesla Tasker Plugin으로 이동 중...</p>
</body>
</html>
